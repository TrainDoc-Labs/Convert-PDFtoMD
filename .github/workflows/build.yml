name: Build PDFtoMD Desktop App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y pathlib
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          pyinstaller --noconsole --onefile --collect-all customtkinter --collect-all pymupdf --name "PDFtoMD" main.py

      - name: Check Dist Folder Contents (Debugging)
        run: |
          dir dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFtoMD-Windows
          path: dist/PDFtoMD.exe
